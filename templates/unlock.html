{% extends "base.html" %}
{% block title %}ادخل 🔐{% endblock %}

{% block content %}
<div class="page-wrap">
  <div class="lock-box">
    <span class="lock-icon">🔐</span>
    <div class="ornament">✦ &nbsp; محتوى خاص &nbsp; ✦</div>
    <div class="divider"></div>
    <h2>هذي الصفحة مقفلة</h2>
    <p>الرسائل الخاصة محمية<br>أدخل كلمة المرور عشان تكمل</p>
    <form method="POST" action="/unlock">
      {% if error %}<div class="error-msg">❌ {{ error }}</div>{% endif %}
      <input type="password" name="password" class="pw-input" placeholder="كلمة المرور" autofocus>
      <button type="submit" class="btn-gold" style="width:100%">دخول →</button>
    </form>
  </div>
</div>
{% endblock %}
